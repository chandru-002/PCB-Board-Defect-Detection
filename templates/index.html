<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PCB Defect Detection</title>
    <style>
        :root {
            --bg: #f5f1e9;
            --panel: #fffaf3;
            --ink: #1f1a14;
            --accent: #be3e1f;
            --accent-soft: #f3cbbf;
            --ok: #1f7a43;
            --danger: #a32121;
            --line: #d8c9b8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 20%, #f7ddd1 0, transparent 35%),
                radial-gradient(circle at 85% 80%, #d7e9dd 0, transparent 32%),
                linear-gradient(160deg, #f4efe6 0%, #efe7da 100%);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .card {
            width: min(760px, 100%);
            background: var(--panel);
            border: 2px solid var(--line);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 16px 50px rgba(55, 41, 25, 0.15);
            animation: enter 420ms ease;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.4rem, 2.5vw, 2rem);
            letter-spacing: 0.3px;
        }

        p.sub {
            margin: 0 0 18px;
            color: #5a4b3d;
            font-size: 1rem;
        }

        form {
            border: 1px dashed var(--line);
            border-radius: 12px;
            padding: 16px;
            background: #fff;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"] {
            flex: 1;
            min-width: 220px;
            border: 1px solid var(--line);
            padding: 10px;
            border-radius: 10px;
            background: #fffefb;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 11px 16px;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
            transition: transform 160ms ease, filter 160ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        .result,
        .error {
            margin-top: 16px;
            border-radius: 12px;
            padding: 14px;
            white-space: pre-wrap;
            line-height: 1.7;
            font-size: 1rem;
        }

        .result {
            border: 1px solid #b8dfc8;
            background: #edf9f1;
            color: var(--ok);
        }

        .error {
            border: 1px solid #e9b5b5;
            background: #fff2f2;
            color: var(--danger);
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.99);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 560px) {
            .card {
                padding: 18px;
            }

            .row {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>PCB Defect Detection</h1>
        <p class="sub">Upload a PCB image and get prediction in the required output format.</p>

        <form method="post" enctype="multipart/form-data">
            <div class="row">
                <input type="file" name="image" accept=".jpg,.jpeg,.png,.bmp,.tif,.tiff" required>
                <button type="submit">Predict Defect</button>
            </div>
        </form>

        {% if prediction_text %}
        {% if defect_name %}
        <div class="result"><strong>Defect Name:</strong> {{ defect_name }}</div>
        {% endif %}
        <div class="result">{{ prediction_text }}</div>
        {% endif %}

        {% if error_text %}
        <div class="error">{{ error_text }}</div>
        {% endif %}
    </main>
</body>

</html>
