[build]
  command = "pip install -r requirements.txt"
  functions = "functions"
  publish = "."

[functions]
  directory = "functions"
  runtime = "python3.11"

[[redirects]]
  from = "/*"
  to = "/"
  status = 200

[dev]
  command = "python app.py"
  port = 5000

[context.production]
  environment = { ENABLE_MODEL_INFERENCE = "0" }
